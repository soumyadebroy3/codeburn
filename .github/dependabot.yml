# Dependabot version updates. Covers every dependency manifest in the repo so
# pins stay fresh — including the GitHub Actions now SHA-pinned in
# .github/workflows/ (Dependabot bumps the SHA and the trailing `# vX` comment).
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # GitHub Actions used across all workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  # Root CLI (npm).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns: ["*"]

  # Windows Tauri app frontend (npm).
  - package-ecosystem: "npm"
    directory: "/windows"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns: ["*"]

  # Windows Tauri app backend (Cargo).
  - package-ecosystem: "cargo"
    directory: "/windows/src-tauri"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns: ["*"]
