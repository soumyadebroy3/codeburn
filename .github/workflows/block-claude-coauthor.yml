name: Block Claude / Anthropic co-author trailers

# Rejects commits that contain a `Co-authored-by: ... claude ...` or
# `... anthropic ...` trailer. Contributors can still use AI tools to help
# write code, but they must remove the co-author attribution before pushing,
# per the project's contributor guidelines.
#
# Runs on TWO event types so direct-to-main pushes can't bypass the check:
#   - pull_request: scans every commit in the PR
#   - push (any branch): scans the commits the push introduced

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve commit range to scan
        id: range
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # Push event. github.event.before is the previous tip; on a
            # brand-new branch (or after force-push of unrelated history)
            # it can be all-zeros — fall back to a single-commit scan
            # against the merge-base with origin/main in that case.
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            ZERO="0000000000000000000000000000000000000000"
            if [[ "$BEFORE" == "$ZERO" ]] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              # Compare against origin/main if reachable, else just scan HEAD.
              if git rev-parse --verify origin/main >/dev/null 2>&1; then
                BASE=$(git merge-base "$AFTER" origin/main || git rev-parse "$AFTER^")
              else
                BASE=$(git rev-parse "$AFTER^" 2>/dev/null || git rev-list --max-parents=0 HEAD | head -1)
              fi
              HEAD="$AFTER"
            else
              BASE="$BEFORE"
              HEAD="$AFTER"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Scanning commit range: $BASE..$HEAD"

      - name: Scan commits for disallowed co-author trailers
        run: |
          set -euo pipefail
          BASE="${{ steps.range.outputs.base }}"
          HEAD="${{ steps.range.outputs.head }}"
          FOUND=0
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            SUBJECT=$(git log -1 "$c" --format=%s)
            if git log -1 "$c" --format="%B" | grep -qiE 'co-authored-by:.*(claude|anthropic)'; then
              echo "::error::Commit $c ($SUBJECT) has a Claude/Anthropic co-author trailer. Please remove it before pushing again."
              FOUND=1
            fi
          done < <(git log --format=%H "$BASE..$HEAD")
          if [ "$FOUND" != "0" ]; then
            echo ""
            echo "How to fix:"
            echo "  1. Run: git rebase -i $BASE"
            echo "  2. Mark each flagged commit as 'reword'"
            echo "  3. Delete the Co-authored-by line from the commit message"
            echo "  4. Save, then: git push --force-with-lease"
            exit 1
          fi
          echo "No disallowed co-author trailers found."
