name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default-restricted permissions. Each job opts in to what it actually needs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Test (Node 22, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install (clean)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        # CODEBURN_DEV=1 lets bundle-litellm.mjs run with a floating ref during CI on
        # main (release builds run from release-npm.yml with the pin enforced).
        env:
          CODEBURN_DEV: '1'
        run: npm test --silent

      - name: Build
        env:
          CODEBURN_DEV: '1'
        run: npm run build

      - name: Smoke-test built CLI
        run: node dist/cli.js --version

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep (pinned)
        # 1.93.0 pulled an opentelemetry-instrumentation version whose
        # internal API later broke (BaseInstrumentor moved). 1.110+ ships
        # against a refreshed opentelemetry pin and imports cleanly on
        # current pip resolvers.
        # setuptools<81 still ships pkg_resources, which Python 3.12 no
        # longer bundles but opentelemetry's instrumentation imports.
        # Newer setuptools (>=81) removed pkg_resources from the default
        # install, so an unpinned `pip install setuptools` doesn't help.
        run: pip install --upgrade pip && pip install 'setuptools<81' 'semgrep==1.110.0'

      - name: Run Semgrep bracket-assign guard
        run: |
          set -e
          semgrep --config .semgrep/rules/no-bracket-assign-hot-paths.yml \
            --strict --json \
            src/providers/ src/parser.ts > semgrep-out.json
          FINDINGS=$(jq '.results | length' semgrep-out.json)
          if [ "$FINDINGS" -gt 0 ]; then
            jq -r '.results[] | "::error file=\(.path),line=\(.start.line)::\(.extra.message)"' semgrep-out.json
            exit 1
          fi

  swift-build:
    name: Swift menubar build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show toolchain
        run: swift --version

      - name: Build
        working-directory: mac
        run: swift build

      - name: Test
        working-directory: mac
        run: swift test
