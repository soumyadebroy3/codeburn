name: firstlook
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to scan (leave empty for all open PRs)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      # Pin firstlook to a tag rather than @main so a compromise of the action
      # repo cannot retroactively rewrite our CI behaviour. Bump the tag in a
      # reviewable PR.
      - uses: getagentseal/firstlook@v1
        with:
          pr-number: ${{ inputs.pr-number }}
          skip-users: 'dependabot[bot],renovate[bot]'
          fail-on: 'unknown'
