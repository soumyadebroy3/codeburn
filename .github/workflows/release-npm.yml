name: Release npm

# Triggered by pushing a `v*` tag. Builds, tests, publishes to npm with sigstore
# provenance, and uploads a CycloneDX SBOM as a release asset. Auth uses npm's
# Trusted Publishing (OIDC): the package's "Trusted Publishers" config on
# npmjs.com pins this exact repo + workflow, so no long-lived NPM_TOKEN is
# stored anywhere — npm verifies the GitHub OIDC claim per publish.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)publish, e.g. v0.9.7'
        required: true

permissions:
  contents: write   # upload assets to the GitHub Release
  id-token: write   # required by `npm publish --provenance`

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node 24
        # Node 24 ships with npm ≥11.6.0 which has native OIDC Trusted
        # Publishing. Node 22 bundles npm 10.9.x and `npm install -g
        # npm@latest` hits a known GitHub Actions toolcache corruption
        # (missing 'promise-retry'). 24 sidesteps both.
        # No `registry-url` — Trusted Publishing requires NO authToken in
        # .npmrc, otherwise npm uses the (empty) NODE_AUTH_TOKEN placeholder
        # setup-node would inject and bypasses the OIDC flow.
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Confirm npm version supports OIDC Trusted Publishing
        run: |
          set -e
          npm --version
          # Bail loudly if the toolcache surprises us with an old npm.
          node -e "
            const v = process.versions.node;
            const npm = require('child_process').execSync('npm --version').toString().trim();
            const [maj, min] = npm.split('.').map(Number);
            if (maj < 11 || (maj === 11 && min < 5)) {
              console.error('npm', npm, 'is too old for Trusted Publishing (need >=11.5.1)');
              process.exit(1);
            }
            console.log('node', v, '+ npm', npm, 'OK');
          "

      - name: Install (clean)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --silent

      - name: Build (with pinned LiteLLM bundle)
        # No CODEBURN_DEV — bundle-litellm.mjs enforces the SHA pin in
        # scripts/litellm-pin.json. Build fails if the upstream SHA doesn't match.
        run: npm run build

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install --no-save @cyclonedx/cyclonedx-npm
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file codeburn-sbom.cdx.json
          echo "SBOM bytes: $(wc -c < codeburn-sbom.cdx.json)"

      - name: Publish to npm with provenance (Trusted Publishing / OIDC)
        # No NODE_AUTH_TOKEN: npm exchanges the workflow's OIDC token for a
        # short-lived publish credential, gated by the Trusted Publishers
        # config on the package itself.
        #
        # Idempotent: if the version is already on npm (e.g. retagging a
        # release after a force-push to fix a hooked commit), skip the publish
        # rather than failing the whole job. This lets `update-homebrew-tap`
        # (which depends on this job) still run and recompute the tarball
        # SHA-256 against the new tag SHA.
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VER} already on npm — skipping publish (homebrew tap update will still run)"
          else
            npm publish --provenance --access public
          fi

      - name: Attach SBOM to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: codeburn-sbom.cdx.json
          fail_on_unmatched_files: false

  update-homebrew-tap:
    # Auto-bumps the soumyadebroy3/homebrew-codeburn formula after a successful
    # npm publish. Runs only on `v*` tag pushes.
    #
    # Auth: short-lived GitHub App installation token, minted per run via
    # actions/create-github-app-token. No long-lived PAT stored anywhere —
    # the only secrets are HOMEBREW_TAP_APP_ID (numeric, public-ish) and
    # HOMEBREW_TAP_APP_PRIVATE_KEY (PEM). Token issued is scoped to the
    # specific App + the specific repos it's installed on (just the tap),
    # and lives ~1h.
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          # Restrict the minted token to ONLY the tap repo — even if the App
          # were ever installed on more repos, this scope clamp keeps the
          # token's blast radius to exactly what the workflow needs.
          owner: soumyadebroy3
          repositories: homebrew-codeburn

      - name: Resolve version
        id: ver
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball SHA-256
        id: sha
        run: |
          set -euo pipefail
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.ver.outputs.value }}.tar.gz"
          # GitHub regenerates the source archive on every fetch, but the
          # bytes are deterministic from the commit content so the hash is
          # stable. Curl the tarball and pipe through sha256sum.
          SHA=$(curl -sfL "$URL" | sha256sum | awk '{print $1}')
          if [[ -z "$SHA" || ${#SHA} -ne 64 ]]; then
            echo "::error::Failed to compute SHA-256 for $URL"
            exit 1
          fi
          echo "value=$SHA" >> "$GITHUB_OUTPUT"
          echo "  SHA-256: $SHA"

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: soumyadebroy3/homebrew-codeburn
          token: ${{ steps.app-token.outputs.token }}
          path: tap
          persist-credentials: true

      - name: Update Formula/codeburn.rb
        working-directory: tap
        env:
          VERSION: ${{ steps.ver.outputs.value }}
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          set -euo pipefail
          # Update both the URL (any prior v* version) and the SHA-256.
          # Use python for safe regex replace — sed -i syntax differs between
          # GNU and BSD and we want the workflow portable across runners.
          python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          sha = os.environ["SHA"]
          path = pathlib.Path("Formula/codeburn.rb")
          src = path.read_text()
          src = re.sub(r"(/refs/tags/)v[\d.]+(\.tar\.gz)", rf"\g<1>{version}\g<2>", src)
          src = re.sub(r'sha256 "[0-9a-f]{64}"', f'sha256 "{sha}"', src)
          path.write_text(src)
          PY
          # Show what changed; if nothing did, exit 0 — idempotent reruns
          # against the same version shouldn't fail.
          if git diff --quiet Formula/codeburn.rb; then
            echo "Formula already at $VERSION; nothing to commit."
            exit 0
          fi
          # Use the GitHub App's bot identity for the commit. The numeric
          # user-id format follows the convention GitHub uses for App-as-author
          # commits — replace 43921833 with the App's user-id once known.
          git config user.email "soumyadebroy3-homebrew-bumper[bot]@users.noreply.github.com"
          git config user.name "soumyadebroy3-homebrew-bumper[bot]"
          git add Formula/codeburn.rb
          git commit -m "codeburn ${VERSION}

          Auto-bumped by codeburn's release-npm.yml after a successful npm
          publish. Tarball SHA-256 computed from the GitHub source archive
          at https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz."
          git push
