name: Release npm

# Triggered by pushing a `v*` tag. Builds, tests, publishes to npm with sigstore
# provenance, and uploads a CycloneDX SBOM as a release asset. Auth uses npm's
# Trusted Publishing (OIDC): the package's "Trusted Publishers" config on
# npmjs.com pins this exact repo + workflow, so no long-lived NPM_TOKEN is
# stored anywhere — npm verifies the GitHub OIDC claim per publish.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)publish, e.g. v0.9.7'
        required: true

permissions:
  contents: write   # upload assets to the GitHub Release
  id-token: write   # required by `npm publish --provenance`

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node 22
        # No `registry-url` here — Trusted Publishing requires no authToken
        # line in .npmrc, otherwise npm uses the (empty) NODE_AUTH_TOKEN
        # placeholder setup-node would inject and bypasses the OIDC flow.
        # `npm publish` falls back to the default public registry, which is
        # what we want.
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to a Trusted-Publishing-capable version
        # Node 22 ships with npm 10.9.x, but OIDC-based Trusted Publishing
        # requires npm ≥11.5.1. Bumping to the latest stable closes that
        # gap and gives us the canonical 'npm publish' OIDC flow.
        run: npm install -g npm@latest

      - name: Install (clean)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --silent

      - name: Build (with pinned LiteLLM bundle)
        # No CODEBURN_DEV — bundle-litellm.mjs enforces the SHA pin in
        # scripts/litellm-pin.json. Build fails if the upstream SHA doesn't match.
        run: npm run build

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install --no-save @cyclonedx/cyclonedx-npm
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file codeburn-sbom.cdx.json
          echo "SBOM bytes: $(wc -c < codeburn-sbom.cdx.json)"

      - name: Publish to npm with provenance (Trusted Publishing / OIDC)
        # No NODE_AUTH_TOKEN: npm exchanges the workflow's OIDC token for a
        # short-lived publish credential, gated by the Trusted Publishers
        # config on the package itself.
        run: npm publish --provenance --access public

      - name: Attach SBOM to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: codeburn-sbom.cdx.json
          fail_on_unmatched_files: false
