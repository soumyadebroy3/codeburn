# SonarQube project config for sonar.1channel.co.
# Used by mcp-sonar/server.mjs's `sonar_scan` tool and by anyone running
# `sonar-scanner` directly. Do not put secrets here — SONAR_TOKEN comes
# from the environment at scan time.

sonar.projectKey=codeburn
sonar.projectName=codeburn

# Source roots: production TS/JS, the Swift menubar, GNOME extension,
# build scripts. tsconfig is auto-detected by the analyzer for TS.
sonar.sources=src,gnome,mac/Sources,scripts
sonar.tests=tests

# Test inclusion / exclusion
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Exclude bundled artefacts and graph cache from the source view.
# `gnome/stylesheet.css` is excluded because GNOME Shell's St widget set
# uses CSS extensions (`spacing`, `:selected`, `:hover` on non-link
# elements) that the W3C-only CSS analyzer flags as bugs. They're valid
# GNOME-extension CSS, just not standard CSS.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.code-review-graph/**,src/data/litellm-snapshot.json,**/.build/**,gnome/stylesheet.css

# TS/JS specifics
sonar.javascript.environments=node
sonar.typescript.tsconfigPath=tsconfig.json

# Test coverage from vitest. Generate via:
#   npm run coverage   (or: npx vitest run --coverage --coverage.reporter=lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Files excluded from coverage requirements but still scanned for issues.
# These are entry points and UI surfaces that we exercise via end-to-end
# smoke tests rather than unit coverage:
#   - cli.ts: top-level Commander wiring
#   - dashboard.tsx / compare.tsx: Ink TUI components
#   - mcp/ + mcp-sonar/: stdio JSON-RPC server stubs
#   - scripts/: build / bundle helpers
sonar.coverage.exclusions=src/cli.ts,src/dashboard.tsx,src/compare.tsx,src/ink-win.ts,mcp/**,mcp-sonar/**,scripts/**,src/menubar-installer.ts,src/diagnose.ts,src/doctor.ts,src/import-data.ts,src/plugins.ts,src/export-html.ts,src/redact.ts

# Encoding + log noise
sonar.sourceEncoding=UTF-8
sonar.log.level=INFO
